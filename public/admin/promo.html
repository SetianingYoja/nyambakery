<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Kelola Promo - Admin</title>
<link rel="stylesheet" href="../css/style.css" />
<link rel="stylesheet" href="../css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav>
    <a href="dashboard.html">Dashboard</a> | <a href="produk.html">Produk</a> | <a href="kategori.html">Kategori</a> |
    <a href="pesanan.html">Pesanan</a> | <a href="promo.html">Promo</a> | <a href="voucher.html">Voucher</a> |
    <a href="banner.html">Banner</a> | <a href="cabang.html">Cabang</a> | <a href="kelola-admin.html">Admin</a> |
    <a href="laporan.html">Laporan</a> | <a href="live-chat.html">Live Chat</a>
  </nav>

  <main>
    <h1>Kelola Promo</h1>
    <form id="form-promo">
      <input name="judul" placeholder="Judul promo" required />
      <textarea name="deskripsi" placeholder="Deskripsi"></textarea>
      <input name="gambar" placeholder="URL gambar (opsional)" />
      <label>Mulai: <input name="tanggal_mulai" type="date" required /></label>
      <label>Selesai: <input name="tanggal_selesai" type="date" required /></label>
      <label><input name="aktif" type="checkbox" checked /> Aktif</label>
      <button type="submit">Tambah Promo</button>
    </form>

    <table>
      <thead><tr><th>Judul</th><th>Periode</th><th>Status</th><th>Aksi</th></tr></thead>
      <tbody id="tbody-promo"><tr><td colspan="4">Memuat...</td></tr></tbody>
    </table>
  </main>

  <script type="module">
    import { requireAdmin } from "../js/adminGuard.js";
    import { ambilSemuaPromo, tambahPromo, updatePromo, hapusPromo } from "../js/adminPromo.js";

    async function muat() {
      const list = await ambilSemuaPromo();
      document.getElementById("tbody-promo").innerHTML = list.map((p) => `
        <tr>
          <td>${p.judul}</td>
          <td>${p.tanggal_mulai} s/d ${p.tanggal_selesai}</td>
          <td>${p.aktif ? "Aktif" : "Nonaktif"}</td>
          <td>
            <button data-id="${p.id}" data-aktif="${p.aktif}" class="btn-toggle">${p.aktif ? "Nonaktifkan" : "Aktifkan"}</button>
            <button data-id="${p.id}" class="btn-hapus">Hapus</button>
          </td>
        </tr>
      `).join("") || `<tr><td colspan="4">Belum ada promo.</td></tr>`;

      document.querySelectorAll(".btn-toggle").forEach((btn) => {
        btn.addEventListener("click", async () => {
          await updatePromo(btn.dataset.id, { aktif: btn.dataset.aktif !== "true" });
          muat();
        });
      });
      document.querySelectorAll(".btn-hapus").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!confirm("Hapus promo ini?")) return;
          await hapusPromo(btn.dataset.id);
          muat();
        });
      });
    }

    document.getElementById("form-promo").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      await tambahPromo({
        judul: formData.get("judul"),
        deskripsi: formData.get("deskripsi"),
        gambar: formData.get("gambar") || null,
        tanggal_mulai: formData.get("tanggal_mulai"),
        tanggal_selesai: formData.get("tanggal_selesai"),
        aktif: formData.get("aktif") === "on",
      });
      e.target.reset();
      muat();
    });

    (async () => { await requireAdmin(); muat(); })();
  </script>
</body>
</html>
