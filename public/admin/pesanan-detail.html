<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Detail Pesanan - Admin</title>
<link rel="stylesheet" href="../css/style.css" />
<link rel="stylesheet" href="../css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav><a href="pesanan.html">&larr; Kembali ke daftar pesanan</a></nav>
  <main id="detail-container">Memuat...</main>

  <script type="module">
    import { requireAdmin } from "../js/adminGuard.js";
    import { ambilDetailPesananAdmin, ubahStatusPesanan } from "../js/adminPesanan.js";

    const id = new URLSearchParams(location.search).get("id");

    async function muat() {
      const p = await ambilDetailPesananAdmin(id);

      document.getElementById("detail-container").innerHTML = `
        <h1>Pesanan ${p.nomor_pesanan}</h1>
        <p>Pelanggan: ${p.users?.nama_lengkap} (${p.users?.no_hp ?? "-"})</p>
        <p>Alamat: ${p.alamat_pengiriman?.alamat_lengkap ?? "-"}, ${p.alamat_pengiriman?.kota ?? ""}</p>
        <p>Metode bayar: ${p.metode_pembayaran} — Status bayar: ${p.pembayaran?.[0]?.status ?? "-"}</p>
        <p>Catatan: ${p.catatan ?? "-"}</p>
        <ul>
          ${p.detail_pesanan.map(d => `<li>${d.produk?.nama_produk ?? "Produk"} ${d.varian_produk ? `(${d.varian_produk.nama_varian})` : ""} x${d.qty} - Rp ${Number(d.subtotal).toLocaleString("id-ID")}</li>`).join("")}
        </ul>
        <p>Subtotal: Rp ${Number(p.subtotal).toLocaleString("id-ID")}</p>
        <p>Diskon: Rp ${Number(p.diskon).toLocaleString("id-ID")}</p>
        <p>Ongkir: Rp ${Number(p.ongkir).toLocaleString("id-ID")}</p>
        <p><strong>Total: Rp ${Number(p.total_bayar).toLocaleString("id-ID")}</strong></p>

        <label>Ubah status:
          <select id="status-select">
            ${["menunggu","diproses","dikirim","selesai","dibatalkan"].map(s =>
              `<option value="${s}" ${s === p.status_pesanan ? "selected" : ""}>${s}</option>`).join("")}
          </select>
        </label>
        <button id="btn-simpan-status">Simpan Status</button>
      `;

      document.getElementById("btn-simpan-status").addEventListener("click", async () => {
        await ubahStatusPesanan(id, document.getElementById("status-select").value);
        alert("Status pesanan diperbarui.");
        muat();
      });
    }

    (async () => { await requireAdmin(); muat(); })();
  </script>
</body>
</html>
