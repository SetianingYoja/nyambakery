<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Login - NyamBakery</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <main>
    <h2>Login</h2>
    <form id="login-form">
      <input name="email" type="email" placeholder="Email" required />
      <input name="password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <p id="error-msg" style="color:red"></p>
    <p>Belum punya akun? <a href="register.html">Daftar</a></p>
  </main>

  <script type="module">
    import { login, getCurrentUser } from "./js/auth.js";

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      try {
        await login({ email: formData.get("email"), password: formData.get("password") });
        const user = await getCurrentUser();
        location.href = user?.isAdmin ? "admin/dashboard.html" : "katalog.html";
      } catch (err) {
        console.error("ERROR ASLI:", err);
        document.getElementById("error-msg").textContent = "Email atau password salah. Detail: " + err.message;
      }
    });
  </script>
</body>
</html>
