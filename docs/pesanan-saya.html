<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Pesanan Saya - NyamBakery</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <header><h1><a href="index.html">NyamBakery</a></h1></header>
  <nav>
    <a href="katalog.html">Katalog</a> | <a href="cart.html">Keranjang</a> |
    <a href="pesanan-saya.html">Pesanan Saya</a> | <a href="wishlist.html">Wishlist</a> |
    <a href="notifikasi.html">Notifikasi</a> | <a href="profil.html">Profil</a> |
    <a href="login.html">Login</a>
  </nav>

  <main>
    <div class="page-intro">
      <h2>📦 Pesanan Saya</h2>
      <p>Pantau status pesananmu di sini.</p>
    </div>
    <div id="daftar-pesanan">Memuat...</div>
  </main>

  <script type="module">
    import { initChatWidget } from "./js/chatWidget.js";
    initChatWidget();
    import { ambilPesananSaya } from "./js/checkout.js";
    import { getCurrentUser } from "./js/auth.js";

    const statusLabel = {
      menunggu: "Menunggu konfirmasi",
      diproses: "Diproses",
      dikirim: "Dikirim",
      selesai: "Selesai",
      dibatalkan: "Dibatalkan",
    };

    (async () => {
      const user = await getCurrentUser();
      if (!user) { alert("Silakan login dulu."); location.href = "login.html"; return; }

      const pesananList = await ambilPesananSaya(user.id);
      const container = document.getElementById("daftar-pesanan");

      if (pesananList.length === 0) {
        container.innerHTML = "<div class=\"empty-state\">📭 Belum ada pesanan. Yuk mulai belanja di <a href=\"katalog.html\" style=\"color:var(--strawberry-dark); font-weight:700;\">katalog</a>!</div>";
        return;
      }

      container.innerHTML = pesananList.map((p) => `
        <div class="pesanan-card">
          <p><strong>${p.nomor_pesanan}</strong> — <span class="status-badge ${p.status_pesanan}">${statusLabel[p.status_pesanan] ?? p.status_pesanan}</span></p>
          <p style="color:var(--cocoa-soft); font-size:0.85rem;">${new Date(p.created_at).toLocaleString("id-ID")}</p>
          <ul>
            ${p.detail_pesanan.map(d => `<li>${d.produk?.nama_produk ?? "Produk"} x${d.qty} - Rp ${Number(d.subtotal).toLocaleString("id-ID")}</li>`).join("")}
          </ul>
          <p>Total: <strong style="color:var(--strawberry-dark)">Rp ${Number(p.total_bayar).toLocaleString("id-ID")}</strong></p>
        </div>
      `).join("");
    })();
  </script>
</body>
</html>
