<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Wishlist - NyamBakery</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <header><h1><a href="index.html">NyamBakery</a></h1></header>
  <nav>
    <a href="katalog.html">Katalog</a> | <a href="cart.html">Keranjang</a> |
    <a href="pesanan-saya.html">Pesanan Saya</a> | <a href="wishlist.html">Wishlist</a> | <a href="profil.html">Profil</a>
  </nav>

  <main>
    <h2>Wishlist Saya</h2>
    <div id="wishlist-grid" class="produk-grid">Memuat...</div>
  </main>

  <script type="module">
    import { initChatWidget } from "./js/chatWidget.js";
    initChatWidget();
    import { ambilWishlist, toggleWishlist } from "./js/wishlist.js";
    import { tambahKeKeranjang } from "./js/cart.js";
    import { getCurrentUser } from "./js/auth.js";

    let userId = null;

    async function muat() {
      const list = await ambilWishlist(userId);
      const grid = document.getElementById("wishlist-grid");

      grid.innerHTML = list.length ? list.map((w) => `
        <div class="shop-card">
          <img src="${w.produk.thumbnail}" style="width:100%" />
          <h3>${w.produk.nama_produk}</h3>
          <p>Rp ${Number(w.produk.harga).toLocaleString("id-ID")}</p>
          <button data-produk-id="${w.produk_id}" class="btn-tambah-cart">+ Keranjang</button>
          <button data-produk-id="${w.produk_id}" class="btn-hapus-wishlist btn-hapus">Hapus dari Wishlist</button>
        </div>
      `).join("") : "<p>Wishlist masih kosong.</p>";

      grid.querySelectorAll(".btn-tambah-cart").forEach((btn) => {
        btn.addEventListener("click", async () => {
          await tambahKeKeranjang({ userId, produkId: Number(btn.dataset.produkId), qty: 1 });
          alert("Ditambahkan ke keranjang!");
        });
      });

      grid.querySelectorAll(".btn-hapus-wishlist").forEach((btn) => {
        btn.addEventListener("click", async () => {
          await toggleWishlist({ userId, produkId: Number(btn.dataset.produkId) });
          muat();
        });
      });
    }

    (async () => {
      const user = await getCurrentUser();
      if (!user) { alert("Silakan login dulu."); location.href = "login.html"; return; }
      userId = user.id;
      muat();
    })();
  </script>
</body>
</html>
