<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Login - NyamBakery</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">🥐</div>
      <h2>Selamat Datang!</h2>
      <form id="login-form">
        <input name="email" type="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit" style="width:100%;">Login</button>
      </form>
      <p id="error-msg" style="color:#E85D4D"></p>
      <p>Belum punya akun? <a href="register.html">Daftar di sini</a></p>
    </div>
  </div>

  <script type="module">
    import { login, getCurrentUser } from "./js/auth.js";

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      try {
        await login({ email: formData.get("email"), password: formData.get("password") });
        const user = await getCurrentUser();
        location.href = user?.isAdmin ? "admin/dashboard.html" : "katalog.html";
      } catch (err) {
        document.getElementById("error-msg").textContent = "Email atau password salah.";
      }
    });
  </script>
</body>
</html>
