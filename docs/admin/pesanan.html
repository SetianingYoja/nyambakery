<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Kelola Pesanan - Admin</title>
<link rel="stylesheet" href="../css/style.css" />
<link rel="stylesheet" href="../css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav>
    <a href="dashboard.html">Dashboard</a> | <a href="produk.html">Produk</a> | <a href="kategori.html">Kategori</a> |
    <a href="pesanan.html">Pesanan</a> | <a href="promo.html">Promo</a> | <a href="voucher.html">Voucher</a> |
    <a href="banner.html">Banner</a> | <a href="cabang.html">Cabang</a> | <a href="kelola-admin.html">Admin</a> |
    <a href="laporan.html">Laporan</a> | <a href="live-chat.html">Live Chat</a> | <a href="ai-assistant.html">Admin AI</a>
  </nav>

  <main>
    <h1>Kelola Pesanan</h1>
    <select id="filter-status">
      <option value="">Semua status</option>
      <option value="menunggu">Menunggu</option>
      <option value="diproses">Diproses</option>
      <option value="dikirim">Dikirim</option>
      <option value="selesai">Selesai</option>
      <option value="dibatalkan">Dibatalkan</option>
    </select>

    <table>
      <thead><tr><th>No. Pesanan</th><th>Pelanggan</th><th>Total</th><th>Status</th><th>Tanggal</th><th>Aksi</th></tr></thead>
      <tbody id="tbody-pesanan"><tr><td colspan="6">Memuat...</td></tr></tbody>
    </table>
  </main>

  <script type="module">
    import { requireAdmin } from "../js/adminGuard.js";
    import { ambilSemuaPesanan } from "../js/adminPesanan.js";

    async function muat() {
      const status = document.getElementById("filter-status").value;
      const list = await ambilSemuaPesanan(status);

      document.getElementById("tbody-pesanan").innerHTML = list.map((p) => `
        <tr>
          <td>${p.nomor_pesanan}</td>
          <td>${p.users?.nama_lengkap ?? "-"}</td>
          <td>Rp ${Number(p.total_bayar).toLocaleString("id-ID")}</td>
          <td>${p.status_pesanan}</td>
          <td>${new Date(p.created_at).toLocaleDateString("id-ID")}</td>
          <td><a href="pesanan-detail.html?id=${p.id}">Lihat Detail</a></td>
        </tr>
      `).join("") || `<tr><td colspan="6">Belum ada pesanan.</td></tr>`;
    }

    document.getElementById("filter-status").addEventListener("change", muat);
    (async () => { await requireAdmin(); muat(); })();
  </script>
</body>
</html>
