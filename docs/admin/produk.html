<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Kelola Produk - Admin</title>
<link rel="stylesheet" href="../css/style.css" />
<link rel="stylesheet" href="../css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav>
    <a href="dashboard.html">Dashboard</a> | <a href="produk.html">Produk</a> | <a href="kategori.html">Kategori</a> |
    <a href="pesanan.html">Pesanan</a> | <a href="promo.html">Promo</a> | <a href="voucher.html">Voucher</a> |
    <a href="banner.html">Banner</a> | <a href="cabang.html">Cabang</a> | <a href="kelola-admin.html">Admin</a> |
    <a href="laporan.html">Laporan</a> | <a href="live-chat.html">Live Chat</a> | <a href="ai-agent.html">AI Agent</a>
  </nav>

  <main>
    <h1>Kelola Produk</h1>
    <a href="produk-form.html"><button>+ Tambah Produk</button></a>
    <table>
      <thead>
        <tr><th>Gambar</th><th>Nama</th><th>Kategori</th><th>Harga</th><th>Stok</th><th>Status</th><th>Aksi</th></tr>
      </thead>
      <tbody id="tbody-produk"><tr><td colspan="7">Memuat...</td></tr></tbody>
    </table>
  </main>

  <script type="module">
    import { requireAdmin } from "../js/adminGuard.js";
    import { ambilSemuaProdukAdmin, hapusProduk, arsipkanProduk } from "../js/adminProduk.js";

    async function muat() {
      const list = await ambilSemuaProdukAdmin();
      document.getElementById("tbody-produk").innerHTML = list.map((p) => `
        <tr>
          <td><img src="${p.thumbnail}" style="width:60px" /></td>
          <td>${p.nama_produk}</td>
          <td>${p.kategori_produk?.nama_kategori ?? "-"}</td>
          <td>Rp ${Number(p.harga).toLocaleString("id-ID")}</td>
          <td>${p.jumlah_stok}</td>
          <td>${p.diarsipkan ? "Diarsipkan" : "Aktif"}</td>
          <td>
            <a href="produk-form.html?id=${p.id}">Edit</a> |
            <button data-id="${p.id}" data-arsip="${p.diarsipkan}" class="btn-arsip">${p.diarsipkan ? "Aktifkan" : "Arsipkan"}</button> |
            <button data-id="${p.id}" class="btn-hapus">Hapus</button>
          </td>
        </tr>
      `).join("");

      document.querySelectorAll(".btn-hapus").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!confirm("Yakin hapus produk ini permanen?")) return;
          await hapusProduk(Number(btn.dataset.id));
          muat();
        });
      });

      document.querySelectorAll(".btn-arsip").forEach((btn) => {
        btn.addEventListener("click", async () => {
          await arsipkanProduk(Number(btn.dataset.id), btn.dataset.arsip !== "true");
          muat();
        });
      });
    }

    (async () => { await requireAdmin(); muat(); })();
  </script>
</body>
</html>
