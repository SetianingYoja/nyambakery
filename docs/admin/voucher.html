<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Kelola Voucher - Admin</title>
<link rel="stylesheet" href="../css/style.css" />
<link rel="stylesheet" href="../css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav>
    <a href="dashboard.html">Dashboard</a> | <a href="produk.html">Produk</a> | <a href="kategori.html">Kategori</a> |
    <a href="pesanan.html">Pesanan</a> | <a href="promo.html">Promo</a> | <a href="voucher.html">Voucher</a> |
    <a href="banner.html">Banner</a> | <a href="cabang.html">Cabang</a> | <a href="kelola-admin.html">Admin</a> |
    <a href="laporan.html">Laporan</a> | <a href="live-chat.html">Live Chat</a> | <a href="ai-agent.html">AI Agent</a>
  </nav>

  <main>
    <h1>Kelola Voucher</h1>
    <form id="form-voucher">
      <input name="kode" placeholder="Kode voucher (mis. HEMAT10)" required />
      <input name="nama_voucher" placeholder="Nama voucher" required />
      <select name="tipe_diskon" required>
        <option value="persen">Persen (%)</option>
        <option value="nominal">Nominal (Rp)</option>
      </select>
      <input name="nilai_diskon" type="number" placeholder="Nilai diskon" required />
      <input name="minimal_belanja" type="number" placeholder="Minimal belanja" value="0" />
      <label>Mulai: <input name="tanggal_mulai" type="date" required /></label>
      <label>Selesai: <input name="tanggal_selesai" type="date" required /></label>
      <button type="submit">Tambah Voucher</button>
    </form>

    <table>
      <thead><tr><th>Kode</th><th>Nama</th><th>Diskon</th><th>Periode</th><th>Status</th><th>Aksi</th></tr></thead>
      <tbody id="tbody-voucher"><tr><td colspan="6">Memuat...</td></tr></tbody>
    </table>
  </main>

  <script type="module">
    import { requireAdmin } from "../js/adminGuard.js";
    import { ambilSemuaVoucher, tambahVoucher, updateVoucher, hapusVoucher } from "../js/adminVoucher.js";

    async function muat() {
      const list = await ambilSemuaVoucher();
      document.getElementById("tbody-voucher").innerHTML = list.map((v) => `
        <tr>
          <td>${v.kode}</td>
          <td>${v.nama_voucher}</td>
          <td>${v.tipe_diskon === "persen" ? v.nilai_diskon + "%" : "Rp " + Number(v.nilai_diskon).toLocaleString("id-ID")}</td>
          <td>${v.tanggal_mulai} s/d ${v.tanggal_selesai}</td>
          <td>${v.aktif ? "Aktif" : "Nonaktif"}</td>
          <td>
            <button data-id="${v.id}" data-aktif="${v.aktif}" class="btn-toggle">${v.aktif ? "Nonaktifkan" : "Aktifkan"}</button>
            <button data-id="${v.id}" class="btn-hapus">Hapus</button>
          </td>
        </tr>
      `).join("") || `<tr><td colspan="6">Belum ada voucher.</td></tr>`;

      document.querySelectorAll(".btn-toggle").forEach((btn) => {
        btn.addEventListener("click", async () => {
          await updateVoucher(btn.dataset.id, { aktif: btn.dataset.aktif !== "true" });
          muat();
        });
      });
      document.querySelectorAll(".btn-hapus").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!confirm("Hapus voucher ini?")) return;
          await hapusVoucher(btn.dataset.id);
          muat();
        });
      });
    }

    document.getElementById("form-voucher").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      try {
        await tambahVoucher({
          kode: formData.get("kode").toUpperCase(),
          nama_voucher: formData.get("nama_voucher"),
          tipe_diskon: formData.get("tipe_diskon"),
          nilai_diskon: Number(formData.get("nilai_diskon")),
          minimal_belanja: Number(formData.get("minimal_belanja")) || 0,
          tanggal_mulai: formData.get("tanggal_mulai"),
          tanggal_selesai: formData.get("tanggal_selesai"),
          aktif: true,
        });
        e.target.reset();
        muat();
      } catch (err) {
        alert("Gagal menambah voucher: " + err.message);
      }
    });

    (async () => { await requireAdmin(); muat(); })();
  </script>
</body>
</html>
