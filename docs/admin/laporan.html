<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Laporan Penjualan - Admin</title>
<link rel="stylesheet" href="../css/style.css" />
<link rel="stylesheet" href="../css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav>
    <a href="dashboard.html">Dashboard</a> | <a href="produk.html">Produk</a> | <a href="kategori.html">Kategori</a> |
    <a href="pesanan.html">Pesanan</a> | <a href="promo.html">Promo</a> | <a href="voucher.html">Voucher</a> |
    <a href="banner.html">Banner</a> | <a href="cabang.html">Cabang</a> | <a href="kelola-admin.html">Admin</a> |
    <a href="laporan.html">Laporan</a> | <a href="live-chat.html">Live Chat</a> | <a href="ai-agent.html">AI Agent</a>
  </nav>

  <main>
    <h1>Laporan Penjualan</h1>
    <form id="filter-tanggal">
      <label>Dari: <input type="date" name="dari" /></label>
      <label>Sampai: <input type="date" name="sampai" /></label>
      <button type="submit">Tampilkan</button>
    </form>

    <div id="ringkasan"></div>

    <h2>Produk Terlaris</h2>
    <ol id="produk-terlaris"></ol>

    <h2>Daftar Transaksi</h2>
    <table>
      <thead><tr><th>No. Pesanan</th><th>Tanggal</th><th>Status</th><th>Total</th></tr></thead>
      <tbody id="tbody-laporan"></tbody>
    </table>
  </main>

  <script type="module">
    import { requireAdmin } from "../js/adminGuard.js";
    import { ambilLaporanPenjualan, ambilProdukTerlaris } from "../js/adminLaporan.js";

    async function muat(dari = "", sampai = "") {
      const data = await ambilLaporanPenjualan({ dariTanggal: dari, sampaiTanggal: sampai });

      const totalPendapatan = data.reduce((sum, p) => sum + Number(p.total_bayar), 0);
      document.getElementById("ringkasan").innerHTML = `
        <p>Jumlah transaksi: <strong>${data.length}</strong></p>
        <p>Total pendapatan: <strong>Rp ${totalPendapatan.toLocaleString("id-ID")}</strong></p>
      `;

      document.getElementById("tbody-laporan").innerHTML = data.map((p) => `
        <tr>
          <td>${p.nomor_pesanan}</td>
          <td>${new Date(p.created_at).toLocaleDateString("id-ID")}</td>
          <td>${p.status_pesanan}</td>
          <td>Rp ${Number(p.total_bayar).toLocaleString("id-ID")}</td>
        </tr>
      `).join("") || `<tr><td colspan="4">Tidak ada transaksi.</td></tr>`;

      const terlaris = await ambilProdukTerlaris();
      document.getElementById("produk-terlaris").innerHTML = terlaris
        .map((p) => `<li>${p.nama_produk} — ${p.total_terjual} terjual</li>`).join("");
    }

    document.getElementById("filter-tanggal").addEventListener("submit", (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      muat(formData.get("dari"), formData.get("sampai"));
    });

    (async () => { await requireAdmin(); muat(); })();
  </script>
</body>
</html>
