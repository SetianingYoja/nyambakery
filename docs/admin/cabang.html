<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Kelola Cabang - Admin</title>
<link rel="stylesheet" href="../css/style.css" />
<link rel="stylesheet" href="../css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <nav>
    <a href="dashboard.html">Dashboard</a> | <a href="produk.html">Produk</a> | <a href="kategori.html">Kategori</a> |
    <a href="pesanan.html">Pesanan</a> | <a href="promo.html">Promo</a> | <a href="voucher.html">Voucher</a> |
    <a href="banner.html">Banner</a> | <a href="cabang.html">Cabang</a> | <a href="kelola-admin.html">Admin</a> |
    <a href="laporan.html">Laporan</a> | <a href="live-chat.html">Live Chat</a> | <a href="ai-agent.html">AI Agent</a>
  </nav>

  <main>
    <h1>Kelola Cabang Toko</h1>
    <form id="form-cabang">
      <input name="nama_cabang" placeholder="Nama cabang" required />
      <textarea name="alamat" placeholder="Alamat" required></textarea>
      <input name="telepon" placeholder="Telepon" />
      <input name="whatsapp" placeholder="WhatsApp" />
      <input name="jam_operasional" placeholder="Jam operasional (mis. 08:00 - 20:00)" />
      <input name="maps_link" placeholder="Link Google Maps" />
      <button type="submit">Tambah Cabang</button>
    </form>

    <table>
      <thead><tr><th>Nama</th><th>Alamat</th><th>Telepon</th><th>Status</th><th>Aksi</th></tr></thead>
      <tbody id="tbody-cabang"><tr><td colspan="5">Memuat...</td></tr></tbody>
    </table>
  </main>

  <script type="module">
    import { requireAdmin } from "../js/adminGuard.js";
    import { ambilSemuaCabang, tambahCabang, updateCabang, hapusCabang } from "../js/adminCabang.js";

    async function muat() {
      const list = await ambilSemuaCabang();
      document.getElementById("tbody-cabang").innerHTML = list.map((c) => `
        <tr>
          <td>${c.nama_cabang}</td>
          <td>${c.alamat}</td>
          <td>${c.telepon ?? "-"}</td>
          <td>${c.status_cabang}</td>
          <td>
            <button data-id="${c.id}" data-status="${c.status_cabang}" class="btn-toggle">${c.status_cabang === "aktif" ? "Nonaktifkan" : "Aktifkan"}</button>
            <button data-id="${c.id}" class="btn-hapus">Hapus</button>
          </td>
        </tr>
      `).join("") || `<tr><td colspan="5">Belum ada cabang.</td></tr>`;

      document.querySelectorAll(".btn-toggle").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const statusBaru = btn.dataset.status === "aktif" ? "nonaktif" : "aktif";
          await updateCabang(btn.dataset.id, { status_cabang: statusBaru });
          muat();
        });
      });
      document.querySelectorAll(".btn-hapus").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!confirm("Hapus cabang ini?")) return;
          await hapusCabang(btn.dataset.id);
          muat();
        });
      });
    }

    document.getElementById("form-cabang").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      await tambahCabang({
        nama_cabang: formData.get("nama_cabang"),
        alamat: formData.get("alamat"),
        telepon: formData.get("telepon"),
        whatsapp: formData.get("whatsapp"),
        jam_operasional: formData.get("jam_operasional"),
        maps_link: formData.get("maps_link"),
        status_cabang: "aktif",
      });
      e.target.reset();
      muat();
    });

    (async () => { await requireAdmin(); muat(); })();
  </script>
</body>
</html>
