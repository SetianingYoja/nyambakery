<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NyamBakery</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/app.css" />
<!-- Supabase JS client lewat CDN, tidak perlu build tool -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

  <header>
    <h1>NyamBakery</h1>
  </header>
  <nav id="nav-utama">
    <a href="katalog.html">Katalog</a> | <a href="cart.html">Keranjang</a> |
    <span id="nav-auth">
      <a href="login.html">Login</a> | <a href="register.html">Daftar</a>
    </span>
  </nav>

  <main>
    <section class="hero">
      <h2>Kue &amp; Roti Segar, Diantar Hangat 🍰</h2>
      <p>Dipanggang setiap hari dari dapur NyamBakery — pesan online, tanpa ribet, langsung nyaman.</p>
    </section>
    <div class="wave-divider"></div>

    <section id="katalog">
      <div class="section-title">
        <span class="emoji">🥖</span>
        <h2>Produk Pilihan</h2>
      </div>
      <div id="produk-list" class="produk-grid">Memuat produk...</div>
    </section>
  </main>

  <!-- Widget live chat pelanggan -->
  <div id="live-chat-widget">
    <button id="chat-toggle">💬 Chat Admin</button>
    <div id="chat-box" hidden>
      <div id="chat-messages"></div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Tulis pesan..." required />
        <button type="submit">Kirim</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { supabase } from "./js/supabaseClient.js";
    import { getCurrentUser } from "./js/auth.js";
    import { kirimChatCustomer, ambilRiwayatChat, dengarkanChatCustomer } from "./js/liveChat.js";

    // --- Contoh: ambil daftar produk langsung dari Supabase ---
    async function muatProduk() {
      const { data, error } = await supabase
        .from("produk")
        .select("id, nama_produk, harga, thumbnail, best_seller")
        .eq("diarsipkan", false)
        .order("created_at", { ascending: false });

      const container = document.getElementById("produk-list");
      if (error) {
        container.textContent = "Gagal memuat produk.";
        return;
      }
      container.innerHTML = data.map(p => `
        <div class="shop-card">
          ${p.best_seller ? '<span class="badge-best">⭐ Favorit</span>' : ""}
          <img src="uploads/produk/${p.thumbnail}" alt="${p.nama_produk}" />
          <h3>${p.nama_produk}</h3>
          <p>Rp ${Number(p.harga).toLocaleString("id-ID")}</p>
        </div>
      `).join("");
    }

    // --- Tampilkan status login di navbar ---
    async function perbaruiNavAuth() {
      const user = await getCurrentUser();
      const navAuth = document.getElementById("nav-auth");
      if (user) {
        navAuth.innerHTML = `Halo, ${user.nama_lengkap ?? user.username ?? "Pengguna"} |
          <a href="${user.isAdmin ? "admin/dashboard.html" : "profil.html"}">${user.isAdmin ? "Dashboard Admin" : "Profil"}</a> |
          <a href="#" id="link-logout">Logout</a>`;
        document.getElementById("link-logout").addEventListener("click", async (e) => {
          e.preventDefault();
          const { logout } = await import("./js/auth.js");
          await logout();
          location.reload();
        });
      }
    }

    // --- Live chat widget ---
    async function setupLiveChat() {
      const user = await getCurrentUser();
      const toggleBtn = document.getElementById("chat-toggle");
      const chatBox = document.getElementById("chat-box");
      const messagesEl = document.getElementById("chat-messages");
      const form = document.getElementById("chat-form");
      const input = document.getElementById("chat-input");

      if (!user) {
        toggleBtn.addEventListener("click", () => {
          if (confirm("Silakan login dulu untuk chat dengan admin. Buka halaman login sekarang?")) {
            location.href = "login.html";
          }
        });
        return;
      }

      const sessionId = localStorage.getItem("chat_session_id") ||
        crypto.randomUUID();
      localStorage.setItem("chat_session_id", sessionId);

      function renderPesan(msg) {
        const bubble = document.createElement("div");
        bubble.className = `bubble ${msg.pengirim}`;
        bubble.textContent = msg.pesan;
        messagesEl.appendChild(bubble);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      toggleBtn.addEventListener("click", async () => {
        chatBox.hidden = !chatBox.hidden;
        if (!chatBox.hidden && messagesEl.childElementCount === 0) {
          const riwayat = await ambilRiwayatChat({ userId: user.id, sessionId });
          riwayat.forEach(renderPesan);
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const pesan = input.value.trim();
        if (!pesan) return;
        input.value = "";
        await kirimChatCustomer({ userId: user.id, sessionId, pesan });
      });

      // Realtime: pesan baru (dari admin maupun konfirmasi pesan sendiri) langsung muncul
      dengarkanChatCustomer(user.id, renderPesan);
    }

    muatProduk();
    setupLiveChat();
    perbaruiNavAuth();
  </script>

</body>
</html>
